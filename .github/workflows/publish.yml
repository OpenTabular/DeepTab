name: Publish to PyPI

# Triggered by any v* tag push (created automatically by tag-release.yml for
# stable releases, or pushed manually for RC / pre-releases).
#
# Stable tag  (v1.7.0)      → published as stable release on PyPI
# RC tag       (v1.7.0rc1)  → published as pre-release on PyPI
#
# Requires the "pypi-publish" GitHub Environment to be configured with
# tag-based protection rules so only authorised tags can trigger a publish.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi-publish

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: "poetry"

      - name: Install dependencies
        run: poetry install

      - name: Build package
        run: poetry build

      - name: Determine if pre-release
        id: prerelease
        run: |
          if echo "${{ github.ref_name }}" | grep -qE '(a|b|rc)[0-9]+$'; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "Publishing as pre-release: ${{ github.ref_name }}"
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "Publishing as stable release: ${{ github.ref_name }}"
          fi

      - name: Publish to PyPI
        run: poetry publish
        env:
          POETRY_PYPI_TOKEN_PYPI: ${{ secrets.PYPI_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          generate_release_notes: true
          files: dist/*
